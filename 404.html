<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Jay's Portfolio</title>
    <link rel="stylesheet" href="/_next/static/css/cd5f2fc3f1b4a9f5.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 2rem;
            margin: 1rem 0;
        }
        .error-description {
            margin: 1rem 0;
            max-width: 600px;
        }
        .home-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: background-color 0.3s;
        }
        .home-link:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-message">Page Not Found</h2>
        <p class="error-description">
            The page you're looking for doesn't exist or has been moved.
            Let's get you back on track.
        </p>
        <a href="/" class="home-link">Return to Home</a>
    </div>
</body>
</html>
